server.port=7980
spring.application.name=cycles-server-events
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.password=${REDIS_PASSWORD:}
dispatch.pending.timeout-seconds=5
dispatch.retry.poll-interval-ms=5000
dispatch.retry.batch-size=${RETRY_BATCH_SIZE:100}
dispatch.http.timeout-seconds=30
dispatch.http.connect-timeout-seconds=5
webhook.secret.encryption-key=${WEBHOOK_SECRET_ENCRYPTION_KEY:}
dispatch.max-delivery-age-ms=${MAX_DELIVERY_AGE_MS:86400000}
events.retention.event-ttl-days=${EVENT_TTL_DAYS:90}
events.retention.delivery-ttl-days=${DELIVERY_TTL_DAYS:14}
events.retention.cleanup-interval-ms=${RETENTION_CLEANUP_INTERVAL_MS:3600000}
spring.task.scheduling.pool.size=3
# Actuators (health, info, prometheus) run on a separate management port so
# they are never reachable from the public API port. Deploy 7980 (API) on an
# ingress / public ClusterIP, and 9980 (management) on an internal-only
# ClusterIP scraped by Prometheus.
management.server.port=${MANAGEMENT_PORT:9980}
management.endpoints.web.exposure.include=health,info,prometheus
